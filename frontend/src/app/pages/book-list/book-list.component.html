<section class="page">
  <header class="header">
    <h1>Book List</h1>
    <a routerLink="/add" class="btn">Add Book</a>
  </header>

  <p *ngIf="isLoading">Loading books...</p>
  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <ul *ngIf="!isLoading && books.length > 0" class="book-list">
    <li *ngFor="let book of books" class="book-item">
      <h2>{{ book.title }}</h2>
      <p><strong>Author:</strong> {{ book.author }}</p>
      <p><strong>Description:</strong> {{ book.description }}</p>
      <p *ngIf="book.publishedYear"><strong>Year:</strong> {{ book.publishedYear }}</p>
    </li>
  </ul>

  <p *ngIf="!isLoading && books.length === 0">No books found. Add one from the Add page.</p>
</section>
