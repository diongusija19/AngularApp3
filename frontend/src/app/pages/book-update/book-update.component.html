<section class="page">
  <header class="header">
    <div>
      <h1>Update Book</h1>
      <p>Edit book details and replace or remove the uploaded cover image.</p>
    </div>
    <a routerLink="/list" class="btn-secondary">Back to List</a>
  </header>

  <p *ngIf="isLoading">Loading books...</p>
  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
  <p class="success" *ngIf="successMessage">{{ successMessage }}</p>

  <form *ngIf="!isLoading && books.length > 0" [formGroup]="bookForm" (ngSubmit)="onSubmit()" class="form">
    <label>
      Select Book
      <select [value]="selectedBookId ?? ''" (change)="onBookChange($any($event.target).value)">
        <option *ngFor="let book of books" [value]="book.id">{{ book.title }} by {{ book.author }}</option>
      </select>
    </label>

    <label>
      Title
      <input formControlName="title" type="text" />
    </label>

    <label>
      Author
      <input formControlName="author" type="text" />
    </label>

    <label>
      Description
      <textarea formControlName="description" rows="4"></textarea>
    </label>

    <label>
      Published Year
      <input formControlName="publishedYear" type="number" min="0" />
    </label>

    <div class="cover-panel" *ngIf="currentCoverUrl">
      <span>Current Cover</span>
      <img [src]="currentCoverUrl" alt="Current book cover" class="book-cover" />
    </div>

    <label>
      Replace Cover Image
      <input type="file" accept="image/*" (change)="onFileSelected($event)" />
      <span class="helper-text">{{ selectedFileName }}</span>
    </label>

    <label class="checkbox">
      <input formControlName="removeCover" type="checkbox" />
      Remove current cover image
    </label>

    <p class="error" *ngIf="bookForm.invalid && bookForm.touched">Please complete required fields.</p>

    <button type="submit" [disabled]="isSubmitting">{{ isSubmitting ? 'Updating...' : 'Update Book' }}</button>
  </form>

  <p *ngIf="!isLoading && books.length === 0">No books are available to update yet.</p>
</section>
